<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#312e81" />
<meta name="apple-mobile-web-app-title" content="SCC Exam" />
<title>SCC eTesting</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body { overflow-x: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background:
    radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.55), transparent 50%),
    radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.45), transparent 50%),
    radial-gradient(at 50% 50%, rgba(236, 72, 153, 0.18), transparent 60%),
    linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  color: #1f2937;
  padding-bottom: 90px;
}

#root { max-width: 880px; margin: 0 auto; padding: 16px; }

/* ============ STICKY TOP HEADER ============ */
.topbar {
  position: sticky;
  top: 12px;
  z-index: 50;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 14px 22px;
  border-radius: 16px;
  margin-bottom: 16px;
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.topbar h1 {
  font-size: 17px;
  color: #4f46e5;
  font-weight: 700;
  letter-spacing: -0.2px;
}

.topbar .subtitle { font-size: 12px; color: #6b7280; margin-top: 2px; }

.progress-section {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 200px;
  margin: 0 16px;
}

.progress-pill {
  font-size: 12px;
  color: #4f46e5;
  font-weight: 700;
  background: #ede9fe;
  padding: 6px 12px;
  border-radius: 999px;
  white-space: nowrap;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: rgba(0,0,0,0.06);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
  border-radius: 999px;
  transition: width 0.4s cubic-bezier(0.22, 0.61, 0.36, 1.0);
}

.actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ============ BUTTONS ============ */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: white;
  padding: 12px 26px;
  box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(79, 70, 229, 0.5);
}
.btn-primary:active:not(:disabled) { transform: translateY(0); }

.btn-secondary {
  background: rgba(255, 255, 255, 0.85);
  color: #4f46e5;
  padding: 10px 16px;
  font-size: 13px;
}
.btn-secondary:hover { background: white; }

.btn-ghost {
  background: rgba(0,0,0,0.05);
  color: #1f2937;
  padding: 8px 14px;
  font-size: 13px;
}
.btn-ghost:hover { background: rgba(0,0,0,0.08); }

.btn-big { font-size: 16px; padding: 16px 36px; }

/* ============ SETUP CARD ============ */
.setup-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 30px 32px;
  border-radius: 18px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
  animation: fadeUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1.0);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.setup-card h2 {
  font-size: 19px;
  margin-bottom: 8px;
  color: #1e1b4b;
}

.setup-card .help {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 18px;
}

.subjects-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.subject-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.subject-row:hover { border-color: #a5b4fc; background: #f5f3ff; }
.subject-row.checked {
  border-color: #4f46e5;
  background: linear-gradient(135deg, #ede9fe, #f3e8ff);
}
.subject-row input {
  width: 20px; height: 20px;
  cursor: pointer; accent-color: #4f46e5; flex-shrink: 0;
}
.subject-row .label { flex: 1; font-weight: 600; font-size: 15px; }
.subject-row .count { font-size: 12px; color: #6b7280; font-weight: 500; }

.limit-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.limit-row label { font-size: 14px; font-weight: 500; color: #374151; }
.limit-row input[type="number"] {
  width: 150px;
  padding: 10px 14px;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
}
.limit-row input[type="number"]:focus { outline: none; border-color: #4f46e5; }

.start-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-top: 20px;
}
.start-bar .selected-info { color: #4f46e5; font-weight: 600; font-size: 14px; }

/* ============ QUESTION CARDS ============ */
.questions-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.q-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 22px 26px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  border-left: 4px solid transparent;
  transition: border-left-color 0.3s, box-shadow 0.3s, transform 0.3s;
  scroll-margin-top: 100px;
  animation: cardIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1.0) both;
  animation-delay: var(--delay, 0s);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-card.unanswered-flash {
  animation: shake 0.5s, glowRed 1.4s;
  border-left-color: #ef4444;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

@keyframes glowRed {
  0%, 100% { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  50% { box-shadow: 0 8px 30px rgba(239, 68, 68, 0.6); }
}

/* Submitted state colors */
.q-card.result-correct { border-left-color: #10b981; }
.q-card.result-wrong { border-left-color: #ef4444; }
.q-card.result-skipped { border-left-color: #f59e0b; }

.q-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 10px;
  flex-wrap: wrap;
}

.q-card-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.q-number {
  font-size: 14px;
  font-weight: 700;
  color: #4f46e5;
  background: #ede9fe;
  padding: 5px 12px;
  border-radius: 8px;
  letter-spacing: 0.3px;
}

.subject-tag {
  display: inline-block;
  background: rgba(124, 58, 237, 0.1);
  color: #6d28d9;
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

.result-indicator {
  font-size: 12px;
  font-weight: 700;
  padding: 5px 11px;
  border-radius: 999px;
  letter-spacing: 0.3px;
}

.result-indicator.correct { background: #d1fae5; color: #065f46; }
.result-indicator.wrong { background: #fee2e2; color: #991b1b; }
.result-indicator.skipped { background: #fef3c7; color: #92400e; }

.q-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.55;
  color: #1f2937;
  margin-bottom: 16px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border: 2px solid #e5e7eb;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.18s;
  line-height: 1.45;
  font-size: 14.5px;
}

.option:hover:not(.submitted) {
  border-color: #a5b4fc;
  background: #f5f3ff;
  transform: translateX(2px);
}

.option input {
  margin-top: 3px; cursor: pointer; flex-shrink: 0; accent-color: #4f46e5;
}

.option-letter {
  font-weight: 700;
  color: #4f46e5;
  margin-right: 4px;
}

.option.selected:not(.submitted) {
  border-color: #4f46e5;
  background: #ede9fe;
}

.option.correct {
  border-color: #10b981;
  background: #d1fae5;
  color: #065f46;
}
.option.correct .option-letter { color: #047857; }

.option.wrong {
  border-color: #ef4444;
  background: #fee2e2;
  color: #991b1b;
}
.option.wrong .option-letter { color: #b91c1c; }

.option.submitted { cursor: default; }
.option.submitted:hover { transform: none; }

.badge {
  display: inline-block;
  margin-left: 8px;
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
}
.badge-correct { background: #10b981; color: white; }
.badge-wrong { background: #ef4444; color: white; }

/* ============ RESULT SUMMARY (big card at top) ============ */
.summary {
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 32px 28px;
  margin-bottom: 16px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  text-align: center;
  animation: zoomIn 0.55s cubic-bezier(0.34, 1.6, 0.55, 1.0);
  position: relative;
  overflow: hidden;
}

.summary::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(at top right, rgba(124, 58, 237, 0.08), transparent 50%),
    radial-gradient(at bottom left, rgba(16, 185, 129, 0.08), transparent 50%);
  pointer-events: none;
}

@keyframes zoomIn {
  0% { opacity: 0; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}

.summary h2 {
  font-size: 22px;
  margin-bottom: 4px;
  color: #1e1b4b;
  position: relative;
}

.summary .subtitle-small {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 12px;
}

.score {
  font-size: 64px;
  font-weight: 800;
  margin: 8px 0 4px;
  letter-spacing: -2px;
  line-height: 1;
  position: relative;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.score-good {
  background-image: linear-gradient(135deg, #10b981, #059669);
}
.score-mid {
  background-image: linear-gradient(135deg, #f59e0b, #d97706);
}
.score-bad {
  background-image: linear-gradient(135deg, #ef4444, #dc2626);
}

.score-percent {
  font-size: 16px;
  color: #6b7280;
  font-weight: 600;
  margin-bottom: 20px;
  position: relative;
}

.summary-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
  position: relative;
}

.stat {
  text-align: center;
  min-width: 80px;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: #6b7280;
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 600;
}

.summary-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
  flex-wrap: wrap;
  position: relative;
}

/* ============ FILTER PILLS (results view) ============ */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding: 2px;
  -webkit-overflow-scrolling: touch;
}

.filter-pill {
  background: rgba(255, 255, 255, 0.85);
  color: #1f2937;
  padding: 9px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.filter-pill:hover { background: white; }

.filter-pill.active {
  background: #4f46e5;
  color: white;
  border-color: #4f46e5;
}

/* ============ FLOATING SUBMIT BAR ============ */
.submit-fab {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 10px 14px;
  border-radius: 999px;
  box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: floatUp 0.4s cubic-bezier(0.22, 0.61, 0.36, 1.0);
  max-width: calc(100% - 24px);
}

@keyframes floatUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.fab-info {
  font-size: 13px;
  font-weight: 600;
  color: #4f46e5;
  padding-left: 8px;
  white-space: nowrap;
}

.fab-info.warn { color: #f59e0b; }

.submit-fab .btn-primary {
  padding: 10px 22px;
  font-size: 14px;
  border-radius: 999px;
}

/* ============ EMPTY/NO-MATCH STATE ============ */
.empty-state {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  color: #6b7280;
  font-size: 14px;
}

/* ============ RESPONSIVE ============ */
@media (max-width: 600px) {
  body { padding-bottom: 90px; }
  #root { padding: 10px; }
  .topbar { padding: 12px 14px; top: 6px; border-radius: 14px; }
  .topbar h1 { font-size: 15px; }
  .topbar .subtitle { font-size: 11px; }
  .progress-section { margin: 0 8px; min-width: 100px; }
  .progress-pill { font-size: 11px; padding: 5px 10px; }
  .actions .btn-secondary, .actions .btn-ghost { padding: 7px 10px; font-size: 12px; }

  .setup-card { padding: 20px 18px; border-radius: 14px; }
  .setup-card h2 { font-size: 17px; }
  .subject-row { padding: 12px 14px; }
  .subject-row .label { font-size: 14px; }
  .btn-big { width: 100%; padding: 14px 24px; }

  .q-card { padding: 16px 18px; border-radius: 14px; scroll-margin-top: 80px; }
  .q-number { font-size: 12px; padding: 4px 10px; }
  .subject-tag { font-size: 9px; padding: 4px 9px; }
  .q-text { font-size: 15px; margin-bottom: 14px; }
  .option { padding: 11px 14px; font-size: 14px; gap: 10px; }

  .summary { padding: 24px 18px; border-radius: 16px; }
  .summary h2 { font-size: 18px; }
  .score { font-size: 52px; }
  .summary-stats { gap: 20px; }
  .stat-value { font-size: 26px; }
  .summary-actions { width: 100%; flex-direction: column; gap: 8px; }
  .summary-actions button { width: 100%; }

  .submit-fab { bottom: 10px; padding: 8px 10px; }
  .submit-fab .btn-primary { padding: 9px 18px; font-size: 13px; }
  .fab-info { font-size: 12px; padding-left: 6px; }
}
</style>
</head>

      { q: "Choose the CORRECT statement regarding cabin crew assigned station. (CCM 1.8.2)", options: ["Required cabin crew shall occupy the cabin crew assigned station or assigned passenger seat for takeoff and landing","Required cabin crew shall occupy the cabin crew assigned station for takeoff and landing","Extra cabin crew shall occupy only the assigned passenger seat for takeoff and landing","Required cabin crew shall occupy passenger seat for takeoff and landing"], answer: 1 },
      { q: "Which document is aimed to ensure that the significant change information in the Cabin Crew Manual Part 1 is well updated? (CCM 0.1.2)", options: ["Safety Briefing Highlights","Cabin Safety Circular","Cabin Crew Manual Part 1 Temporary Revision","Cabin Crew Manual Part 2 Temporary Revision"], answer: 2 },
      { q: "Which statement is CORRECT concerning the content in the Cabin Crew Manual Part 1? (CCM/TOC)", options: ["Chapter 1 Applicable Laws, Regulations and Rules/Chapter 3 Standard Operating Procedures","Chapter 2 Administration of First Aid/Chapter 4 Cabin Emergency Procedures","Chapter 5 Emergency Equipment and Location/Chapter 6 Dangerous Goods","Chapter 4 Dangerous Goods/Chapter 7 Security"], answer: 2 },
      { q: "The flight may be operated with reduced minimum number of required cabin crew subject for the following condition: (CCM 1.8.3)", options: ["CAAT may authorize the operation of the flight with reduced minimum number of required cabin crew for up to two consecutive sectors","The minimum number of required cabin crew may be reduced by one or more cabin crew from the required cabin crew complement","The flight may be operated without limitation of sector","The reduction shall be allowed for flight departing from any stations"], answer: 0 },
      { q: "Which word best describes \"an operating procedure or technique, etc. that may result in damage to equipment if not followed carefully\"? (CCM 0.1.7)", options: ["WARNING","Caution","Note","SOP"], answer: 1 },

      { q: "To perform the pre-flight security check, when shall cabin crew who assigned to guard the opened door attaches the Cabin Pre-flight Security Check (Access Control Record) Form at the appropriate location adjacent to the opened door? (CCM 2.3.4.2)", options: ["As soon as cabin crew board the aircraft","When CIC orders CABIN CREW REPORT YOUR EM STATION","Right after finished the pre-flight check of safety and emergency equipment","Just before performing Pre-flight Security Check"], answer: 3 },
      { q: "Which word best describes \"an operating procedure or technique, etc. that may result in personal injury or loss of life if not followed carefully\"? (CCM 0.1.7)", options: ["WARNING","Caution","Note","SOP"], answer: 0 },
      { q: "Which of the following documents concerning the Unruly/Disruptive Passengers? (CCM 7.1.10)", options: ["Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 10","Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and Witness Form","Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 02","Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice, Witness Form and AVSEC Form 06."], answer: 1 },
      { q: "What shall be done (in sequence) in case there is a discrepancy of number of transit/landing passengers occurs when transit passenger onboard during transit stop? (CCM 2.39.4)", options: ["PA reminding landing passengers to disembark, Passenger headcount, Passport and boarding pass check","PA reminding landing passengers to disembark, Passenger headcount, Passengers belongings identification","PA reminding landing passengers to disembark, Passport and boarding pass check, Passenger headcount","PA reminding landing passengers to disembark, Passengers belongings identification, Passport and boarding pass check."], answer: 0 },

      { q: "When not on flight duty, the Crew-in-Charge (CIC) reports to___. (CCM 1.3.2.1)", options: ["DQ","QA","QB","OP-1"], answer: 1 },
      { q: "What should you do if you call station 1L from the crew rest compartment during performing the Cabin Safety and Emergency Equipment Check in the crew rest compartment, but the cabin interphone at station 1L is not available? (CCM 2.38.1)", options: ["Call another cabin crew station to confirm the communication/interphone system check","Call station 1L from your assigned station instead","Confirm the communication/interphone system check with CIC by in person","Make another attempt to call station 1L to confirm the communication/interphone system check"], answer: 0 },
      { q: "In order to avoid any detriment to a crew member performance, opportunities to consume a meal shall be arranged when the flight duty period exceeds __ (CCM 1.7.2.1)", options: ["7 hours","6 hours","5 hours","4 hours"], answer: 2 },
      { q: "If the cabin crew is compelled to contact the pilot requesting permission to enter the flight deck, such cabin crew shall contact the pilot normally but include the _________ which has been set up by P-i-C prior to each flight. (CCM 2.31.4)", options: ["Emergency Code","Identification Code","Urgency Code","Access Code"], answer: 0 },
      { q: "Where can you find the Passenger Disturbance Report (PDR), Flight Disturbance Incident Report (FDIR), and Witness Form? (CCM 7.1.10)", options: ["In the clear folder in AH kit","On the back cover of the Cabin Log","In the binder together with the CES","In the Captain Report Folder (CRF)"], answer: 3 },
      { q: "Refer to cabin crew briefing, which of the following topics not included in the Mandatory Requirements for Pre-flight Briefing (Safety/Security)? (CCM 2.1.2)", options: ["The characteristics of flight related safety issue and/or hazard identification","Update and recent changes to safety-related issues","Aircraft differentiation, cabin defect related to safety and/or specific aircraft information","Flight plan and NOTAM"], answer: 3 },
      { q: "Which statement is correct regarding the carry-on baggage? (CCM 2.9)", options: ["Cabin baggage may only be stowed in approved locations","Cabin baggage should not be stowed against bulkheads","Cabin baggage should not be stowed on passenger lap during taxi, takeoff and landing","All answers are correct"], answer: 3 },

      { q: "According to SI (APR 2025), on which routes will the SIRIVANNAVARI branded Amenities Kit be provided in C/CL service?", options: ["BKK-CDG-BKK, BKK-MXP-BKK, BKK-NRT-BKK, BKK-PVG-BKK","BKK-CDG-BKK, BKK-LHR-BKK, BKK-HND-BKK, BKK-PVG-BKK","BKK-MXP-BKK, BKK-NRT-BKK, BKK-HKG-BKK, BKK-PVG-BKK","BKK-CDG-BKK, BKK-MXP-BKK, BKK-LAX-BKK, BKK-NRT-BKK"], answer: 0 },
      { q: "According to ISOP in C/CL, CA must attend to passengers call within____. (Ref. ISOP Royal Silk Class)", options: ["10 Seconds.","15 Seconds.","20 Seconds.","30 Seconds."], answer: 2 },
      { q: "According to ISOP in C/CL, CA must perform cabin walk around every ____ minutes. (Ref. ISOP Royal Silk Class)", options: ["15-20 Minutes.","30 Minutes.","45 Minutes.","More often."], answer: 1 },
      { q: "About the Royal Class welcome drink service, which answer is incorrect?", options: ["Champagne must be poured in front of passenger.","Drip mat must not be placed on passenger seat in advance.","Always show label and mention the name of champagne.","Welcome drink is to be served before offering hot towels during boarding."], answer: 3 },
      { q: "What should cabin crew do when a passenger orders an unfamiliar drink?", options: ["Inform passenger politely that we serve only popular drinks.","Inform passenger politely that the special request is served in Royal class only.","Ask politely for the ingredients. If not available, offer another kind of drink.","Inform CIC to solve the problem."], answer: 2 },
      { q: "Which aircraft types offer Panasonic system Wi-Fi service? (Ref. SI Apr 2025)", options: ["77Y, 788, 789, 359, 35D","77Y, 788, 789, 359, 35B","77Y, 788, 789, 359, 35C","77Y, 788, 789, 359, 33C"], answer: 0 },
      { q: "CAs with bar box responsibility on flight to LHR must ___. (Ref. Route Specialities)", options: ["Complete C909 form with the details of SEALED CONTAINERS & SEAL NUMBERS. Seal their bars properly. Put the original of C909 inside the carts/units and attach the copy outside.","Complete C909 form with the details of SEALED CONTAINERS & SEAL NUMBERS. Seal their bars properly. Put the original of C909 outside the carts/units and attach the copy inside.","Complete C209 form with the details of SEALED CONTAINERS & SEAL NUMBERS. Seal their bars properly. Put the original of C209 inside the carts/units and attach the copy outside.","Complete C209 form with the details of SEALED CONTAINERS & SEAL NUMBERS. Seal their bars properly. Put the original of C209 outside the carts/units and attach the copy inside."], answer: 2 },
      { q: "Which station required cabin spray prior to boarding? (Ref. Route Specialities)", options: ["CDG","LHR","SYD","HKG"], answer: 2 },
      { q: "Where can the most recent information regarding formalities, regulations, and procedures about in-flight services be found?", options: ["In-flight Services Operation Procedure.","Intercommunication Office Center.","Supplementary Information.","C/A Bulletin."], answer: 2 },
      { q: "What are the 3-letter code for Chennai, Kolkata, Mumbai? (Route Specialities)", options: ["CHN, KOL, MUM","CHN, KKL, MUM","MAA, CCU, BOM","MAA, CCK, BOM"], answer: 2 },
      { q: "Special Security Arrangement is provided by______? (Ref. SI)", options: ["BKKJS","BKKD1","BKKDT","BKKDO"], answer: 1 },
      { q: "UTC at RGN is__? (Ref. Route Specialities)", options: ["7.00","6.30","6.15","5.30"], answer: 1 },
      { q: "Crew Procedure issued by ___.", options: ["BKKDO-A","BKKDQ-1","BKKQA-A","BKKOP-1"], answer: 0 },
      { q: "What is the custom allowance for crew members entering the Kingdom of Thailand? (Ref. Route Specialities)", options: ["200 cigarettes or 250 grams of tobacco and 1 litre of liquor.","250 cigarettes or 250 grams of tobacco and 1 litre of liquor.","200 cigarettes or 200 grams of tobacco and 1 litre of liquor.","250 cigarettes or 200 grams of tobacco and 1 litre of liquor."], answer: 0 },
      { q: "Service delivery time for light snack in flight to Japan/Korea (Late night flight) is ___. (Ref. Route Specialities)", options: ["After takeoff","During shift change","After first meal","After second meal"], answer: 0 },
      { q: "According to the updated Medical Usage Record procedure (Ref: SI Mar 2025), what must cabin crew do after opening and using medicine in the Medical Pack?", options: ["Record all details into the Crew Kit Application.","Record all details into the Medical Usage Record application in Cabin Connect.","Submit a written report to IQSMS.","Record all details into the Medical Usage Record Form in the Medical Pack."], answer: 1 },
      { q: "Which of the following assistance is not required for passengers with disability? (Ref. ISOP)", options: ["Assisting in stowing and retrieving carry-on items including mobility aids and other devices.","Assisting with the opening of food equipment and beverage packing.","CAs are not required to provide medical services.","Informing about the position of food and service equipment on the passengers table."], answer: 2 },
      { q: "Which procedure in Royal Silk is incorrect?", options: ["Arrange mixed nuts and dried fruits in small bowl.","Serve hot snack on small plate with fork and knife on cocktail napkin aside.","Place hot snack on passenger","Use ABS tray to collect used bowl and plate by hand."], answer: 1 },
      { q: "Which procedure in Royal Silk is incorrect for Lunch/Dinner/Supper? (L size service)", options: ["Drink service by service trolley.","Mixed nuts and hot snack/amuse bouche by hand.","Hot towel on towel tray.","First course by cart."], answer: 2 },
      { q: "Which procedure in Royal Silk is incorrect for Lunch/Dinner/Supper? (M size service)", options: ["Drink service by service trolley.","Snack sachet/mixed nuts & dried fruits by hand.","Offer hot towel on towel tray.","First course by cart."], answer: 2 },
      { q: "Which procedure is incorrect for Lunch/Dinner/Supper? (Ref. India Route)", options: ["Drink service with snack by service trolley.","Meal service by cart.","Hot beverage by hand.","Hot towel by long silver tray."], answer: 0 },
      { q: "What information must be submitted via IQSMS if the Royal Silk headphone is missing up to two? (SI)", options: ["Missing quanity and passenger nationality","Missing quantity, passenger name, and seat number","Missing quantity and passenger seat number","Missing quantity, passenger seat number and nationality"], answer: 1 },
      { q: "On Europe/Australia routes, when should rice crackers be served? (SI)", options: ["During shift change together with refreshment","After the first meal service","With the first meal service","On request. Arrange rice crackers in a drawer and place on the galley counter."], answer: 0 },
      { q: "Which flight offers the size L service? (SI)", options: ["TG677","TG601","TG615","TG217"], answer: 0 },
      { q: "What is the correct sequence for seat setup?", options: ["Place the amenity kit/slippers/headphones respectively on the blanket. The amenity kit must be in front of the rest. Place Look Jub TG on the side table, along with the information card. Insert the menu and drink list in the Duty Free Catalogue.","Place the amenity kit/headphone/slippers respectively on the blanket. The amenity kit must be in front of the rest. Place Look Jub TG on the side table, along with the information card. Insert the menu and drink list in the Duty Free Catalogue.","Place the amenity kit/slippers/headphones respectively on the pillow. The amenity kit must be in front of the rest. Place Look Jub TG on the side table, along with the information card. Insert the menu and drink list in the Duty Free Catalogue.","Place the amenity kit/headphone/slippers respectively on the pillow. The amenity kit must be in front of the rest. Place Look Jub TG on the side table, along with the information card. Insert the menu and drink list in the Duty Free Catalogue."], answer: 1 },
      { q: "Which destination requires aircraft disinsection spraying after door-close?", options: ["NRT","CDG","SYD","ICN"], answer: 1 },
      { q: "Which of the following destinations is NOT included in the routes that will received the SIRIVANNAVARI Amenities Kit?", options: ["CDG","NRT","MXP","SYD"], answer: 3 },
      { q: "What menu is not a part of the \"Premium Asian Noodles\" project? (ref. Cabin Insight)", options: ["Boat Noodles, braised pork belly (ก๋วยเตี๋ยวเรือบินหมูสามชั้น)","Boat Noodles, sous vide beef short rib (ก๋วยเตี๋ยวเรือบินซี่โครงเนื้อซูวี)","Pad Thai Noodles, jumbo crab, bleanded with rich crab roe and crab fat (ผัดไทยอร่อยเหาะ คลุกมันปู และเนื้อปู)(ร้านทิพย์สมัย)","Pad Thai Noodles, prawn (ร้านทิพย์สมัย)"], answer: 3 },
      { q: "What is not true about the Japanese meal in the Royal Silk Lunch/Dinner/Supper Service? (Service Clinic03)", options: ["Japanese Bento box will now be served as a first course.","After clearing the first course, the Japanese main course will be served as a complete set on a tray.","The service in sequences (first course, and main course) is applied to lunch and dinner meal services.","The cabin crew presents Japanese Bento Box unopened during the first course service."], answer: 3 },
      { q: "About the Royal Class welcome drink service, which answer is correct?", options: ["Champagne shall be offered as the first priority beverages.","The cabin crew may offer a selection of drinks as welcome drink, present on a silver tray.","Welcome drink is to be served before offering hot towels during boarding.","Preparing a selection of drinks on ABS tray in advance is permitted."], answer: 0 }
    ]
  }
];</script>
<script>
(function () {
  const { useState, useMemo, useEffect, useRef, createElement: e } = React;

  function shuffle(array) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildExam(subjects, selectedIdx, limit) {
    let pool = [];
    selectedIdx.forEach((idx) => {
      subjects[idx].questions.forEach((q) => {
        pool.push({ subject: subjects[idx].name, ...q });
      });
    });
    pool = shuffle(pool);
    if (limit && limit > 0 && limit < pool.length) {
      pool = pool.slice(0, limit);
    }
    return pool.map((q) => {
      const indices = shuffle(q.options.map((_, i) => i));
      const newOptions = indices.map((i) => q.options[i]);
      const newAnswer = indices.indexOf(q.answer);
      return { subject: q.subject, q: q.q, options: newOptions, answer: newAnswer };
    });
  }

  const LETTERS = ["A", "B", "C", "D", "E", "F"];

  function App() {
    const [view, setView] = useState("setup");
    const [selected, setSelected] = useState(SUBJECTS.map((_, i) => i));
    const [limit, setLimit] = useState(0);
    const [exam, setExam] = useState([]);
    const [answers, setAnswers] = useState({});
    const [submitted, setSubmitted] = useState(false);
    const [filter, setFilter] = useState("all"); // "all" | "wrong" | "correct" | "skipped"
    const [flashIdx, setFlashIdx] = useState(null);
    const flashTimer = useRef(null);

    const totalAvailable = useMemo(
      () => selected.reduce((acc, idx) => acc + SUBJECTS[idx].questions.length, 0),
      [selected]
    );

    const total = exam.length;
    const answeredCount = Object.keys(answers).length;

    const score = useMemo(() => {
      if (!submitted) return 0;
      return exam.reduce(
        (acc, q, idx) => acc + (answers[idx] === q.answer ? 1 : 0),
        0
      );
    }, [submitted, exam, answers]);

    const wrongCount = useMemo(() => {
      if (!submitted) return 0;
      return exam.reduce(
        (acc, q, idx) =>
          acc + (answers[idx] !== undefined && answers[idx] !== q.answer ? 1 : 0),
        0
      );
    }, [submitted, exam, answers]);

    const skippedCount = total - score - wrongCount;

    useEffect(() => () => clearTimeout(flashTimer.current), []);

    const toggleSubject = (idx) => {
      setSelected((prev) =>
        prev.includes(idx) ? prev.filter((i) => i !== idx) : [...prev, idx].sort()
      );
    };

    const handleStart = () => {
      if (selected.length === 0) {
        window.alert("Please select at least one subject.");
        return;
      }
      const newExam = buildExam(SUBJECTS, selected, limit);
      setExam(newExam);
      setAnswers({});
      setSubmitted(false);
      setFilter("all");
      setView("exam");
      window.scrollTo({ top: 0, behavior: "instant" });
    };

    const handleSelect = (qIdx, optIdx) => {
      if (submitted) return;
      setAnswers((prev) => ({ ...prev, [qIdx]: optIdx }));
    };

    const handleSubmit = () => {
      // Find first unanswered question
      let firstUnanswered = -1;
      for (let i = 0; i < total; i++) {
        if (answers[i] === undefined) {
          firstUnanswered = i;
          break;
        }
      }

      if (firstUnanswered !== -1) {
        // Scroll to it and flash
        const el = document.getElementById("q-" + firstUnanswered);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        setFlashIdx(firstUnanswered);
        clearTimeout(flashTimer.current);
        flashTimer.current = setTimeout(() => setFlashIdx(null), 1600);
        return;
      }

      // All answered → submit
      setSubmitted(true);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    const handleReshuffle = () => {
      const newExam = buildExam(SUBJECTS, selected, limit);
      setExam(newExam);
      setAnswers({});
      setSubmitted(false);
      setFilter("all");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    const handleBackToSetup = () => {
      setView("setup");
      setExam([]);
      setAnswers({});
      setSubmitted(false);
      setFilter("all");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    const scrollToWrongOrSkipped = () => {
      // After submit, scroll to first wrong or skipped question
      for (let i = 0; i < total; i++) {
        const a = answers[i];
        if (a === undefined || a !== exam[i].answer) {
          const el = document.getElementById("q-" + i);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
          return;
        }
      }
    };

    // ============ SETUP VIEW ============
    if (view === "setup") {
      return e(
        "div",
        null,
        e(
          "div",
          { className: "topbar" },
          e(
            "div",
            null,
            e("h1", null, "📚 SCC eTesting"),
            e("div", { className: "subtitle" }, "Practice exam — choose subjects to start")
          )
        ),
        e(
          "div",
          { className: "setup-card" },
          e("h2", null, "Select Subjects"),
          e("div", { className: "help" }, "Pick one or more subjects to include."),
          e(
            "div",
            { className: "subjects-list" },
            SUBJECTS.map((s, idx) => {
              const checked = selected.includes(idx);
              return e(
                "label",
                { key: idx, className: "subject-row" + (checked ? " checked" : "") },
                e("input", { type: "checkbox", checked, onChange: () => toggleSubject(idx) }),
                e("span", { className: "label" }, s.name),
                e("span", { className: "count" }, s.questions.length + " questions")
              );
            })
          ),
          e("h2", { style: { marginTop: 4 } }, "Number of Questions"),
          e("div", { className: "help" }, "Leave blank or 0 for all available."),
          e(
            "div",
            { className: "limit-row" },
            e("label", { htmlFor: "limit" }, "Limit:"),
            e("input", {
              id: "limit", type: "number", min: 0, max: totalAvailable,
              value: limit || "",
              placeholder: "All (" + totalAvailable + ")",
              onChange: (ev) => {
                const v = parseInt(ev.target.value, 10);
                setLimit(isNaN(v) || v < 0 ? 0 : v);
              },
            }),
            e("span", { style: { color: "#6b7280", fontSize: 13 } }, "of " + totalAvailable + " available")
          ),
          e(
            "div",
            { className: "start-bar" },
            e(
              "div",
              { className: "selected-info" },
              selected.length + " subject(s) · " +
                (limit > 0 && limit < totalAvailable ? limit : totalAvailable) + " questions"
            ),
            e(
              "button",
              { className: "btn-primary btn-big", onClick: handleStart, disabled: selected.length === 0 },
              "Start Exam →"
            )
          )
        )
      );
    }

    // ============ EXAM / RESULTS VIEW ============
    const scoreClass = (() => {
      const pct = (score / total) * 100;
      if (pct >= 80) return "score-good";
      if (pct >= 50) return "score-mid";
      return "score-bad";
    })();

    // Filter questions based on result filter
    const visibleIndices = exam.map((_, i) => i).filter((i) => {
      if (!submitted || filter === "all") return true;
      const a = answers[i];
      if (filter === "correct") return a !== undefined && a === exam[i].answer;
      if (filter === "wrong") return a !== undefined && a !== exam[i].answer;
      if (filter === "skipped") return a === undefined;
      return true;
    });

    return e(
      "div",
      null,
      // STICKY TOP BAR
      e(
        "div",
        { className: "topbar" },
        e(
          "div",
          { style: { minWidth: 0 } },
          e("h1", null, submitted ? "📊 Exam Result" : "📚 SCC eTesting"),
          e(
            "div",
            { className: "subtitle" },
            submitted ? "Tap a card to review · " + total + " questions" : "Practice in progress"
          )
        ),
        !submitted && e(
          "div",
          { className: "progress-section" },
          e(
            "div",
            { className: "progress-track" },
            e("div", {
              className: "progress-fill",
              style: { width: ((answeredCount / total) * 100) + "%" },
            })
          ),
          e("div", { className: "progress-pill" }, answeredCount + " / " + total)
        ),
        e(
          "div",
          { className: "actions" },
          submitted && e(
            "button",
            { className: "btn-secondary", onClick: handleReshuffle },
            "↻ New Attempt"
          ),
          e(
            "button",
            { className: "btn-ghost", onClick: handleBackToSetup },
            "Exit"
          )
        )
      ),

      // SUMMARY (only after submit)
      submitted && e(
        "div",
        { className: "summary" },
        e("h2", null, "Your Score"),
        e("div", { className: "subtitle-small" }, total + " questions answered"),
        e("div", { className: "score " + scoreClass }, score + " / " + total),
        e("div", { className: "score-percent" }, ((score / total) * 100).toFixed(1) + "% correct"),
        e(
          "div",
          { className: "summary-stats" },
          e(
            "div",
            { className: "stat" },
            e("div", { className: "stat-value", style: { color: "#10b981" } }, score),
            e("div", { className: "stat-label" }, "Correct")
          ),
          e(
            "div",
            { className: "stat" },
            e("div", { className: "stat-value", style: { color: "#ef4444" } }, wrongCount),
            e("div", { className: "stat-label" }, "Wrong")
          ),
          e(
            "div",
            { className: "stat" },
            e("div", { className: "stat-value", style: { color: "#f59e0b" } }, skippedCount),
            e("div", { className: "stat-label" }, "Skipped")
          )
        ),
        e(
          "div",
          { className: "summary-actions" },
          wrongCount + skippedCount > 0 && e(
            "button",
            { className: "btn-secondary", onClick: scrollToWrongOrSkipped },
            "↓ Review Mistakes"
          ),
          e(
            "button",
            { className: "btn-primary", onClick: handleReshuffle },
            "↻ Try Again"
          )
        )
      ),

      // FILTER PILLS (only after submit)
      submitted && e(
        "div",
        { className: "filter-bar" },
        e(
          "button",
          {
            className: "filter-pill" + (filter === "all" ? " active" : ""),
            onClick: () => setFilter("all"),
          },
          "All (" + total + ")"
        ),
        e(
          "button",
          {
            className: "filter-pill" + (filter === "wrong" ? " active" : ""),
            onClick: () => setFilter("wrong"),
          },
          "✗ Wrong (" + wrongCount + ")"
        ),
        e(
          "button",
          {
            className: "filter-pill" + (filter === "skipped" ? " active" : ""),
            onClick: () => setFilter("skipped"),
          },
          "⊘ Skipped (" + skippedCount + ")"
        ),
        e(
          "button",
          {
            className: "filter-pill" + (filter === "correct" ? " active" : ""),
            onClick: () => setFilter("correct"),
          },
          "✓ Correct (" + score + ")"
        )
      ),

      // QUESTIONS LIST
      visibleIndices.length === 0
        ? e("div", { className: "empty-state" }, "No questions match this filter.")
        : e(
            "div",
            { className: "questions-list" },
            visibleIndices.map((qIdx, listIdx) => {
              const q = exam[qIdx];
              const userPick = answers[qIdx];
              const isCorrect = userPick !== undefined && userPick === q.answer;
              const isWrong = userPick !== undefined && userPick !== q.answer;
              const isSkipped = userPick === undefined;

              let cardClass = "q-card";
              if (submitted) {
                if (isCorrect) cardClass += " result-correct";
                else if (isWrong) cardClass += " result-wrong";
                else if (isSkipped) cardClass += " result-skipped";
              }
              if (flashIdx === qIdx) cardClass += " unanswered-flash";

              return e(
                "div",
                {
                  id: "q-" + qIdx,
                  key: qIdx,
                  className: cardClass,
                  style: { "--delay": Math.min(listIdx * 0.02, 0.4) + "s" },
                },
                e(
                  "div",
                  { className: "q-card-header" },
                  e(
                    "div",
                    { className: "q-card-left" },
                    e("span", { className: "q-number" }, "Q " + (qIdx + 1)),
                    e("span", { className: "subject-tag" }, q.subject)
                  ),
                  submitted && e(
                    "span",
                    {
                      className:
                        "result-indicator " +
                        (isCorrect ? "correct" : isWrong ? "wrong" : "skipped"),
                    },
                    isCorrect ? "✓ Correct" : isWrong ? "✗ Wrong" : "⊘ Skipped"
                  )
                ),
                e("div", { className: "q-text" }, q.q),
                e(
                  "div",
                  { className: "options" },
                  q.options.map((opt, optIdx) => {
                    const isPicked = userPick === optIdx;
                    const isAnswer = q.answer === optIdx;
                    let className = "option";
                    if (submitted) {
                      className += " submitted";
                      if (isAnswer) className += " correct";
                      else if (isPicked) className += " wrong";
                    } else if (isPicked) {
                      className += " selected";
                    }
                    return e(
                      "label",
                      { className, key: optIdx },
                      e("input", {
                        type: "radio",
                        name: "q-radio-" + qIdx,
                        checked: isPicked === optIdx,
                        onChange: () => handleSelect(qIdx, optIdx),
                        disabled: submitted,
                      }),
                      e(
                        "span",
                        null,
                        e("span", { className: "option-letter" }, LETTERS[optIdx] + "."),
                        " ",
                        opt,
                        submitted && isAnswer && e("span", { className: "badge badge-correct" }, "Correct"),
                        submitted && isPicked && !isAnswer && e("span", { className: "badge badge-wrong" }, "Your answer")
                      )
                    );
                  })
                )
              );
            })
          ),

      // FLOATING SUBMIT FAB (only during exam, not submitted)
      !submitted && total > 0 && e(
        "div",
        { className: "submit-fab" },
        e(
          "span",
          {
            className: "fab-info" + (answeredCount < total ? " warn" : ""),
          },
          answeredCount < total
            ? (total - answeredCount) + " left"
            : "All answered ✓"
        ),
        e(
          "button",
          { className: "btn-primary", onClick: handleSubmit },
          "Submit ✓"
        )
      )
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(e(App));
})();
</script>
